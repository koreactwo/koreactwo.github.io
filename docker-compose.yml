version: '3.8'
# docker-compose.yml 파일
services:
  # 'app'이라는 이름의 서비스를 정의합니다.
  app:
    image: oven/bun:latest
    container_name: bun_hono
    # -v $(pwd):/app -w /app 옵션과 동일
    volumes:
      - .:/app
    working_dir: /app
    # -p 5173:5173 옵션과 동일
    ports:
      - "5173:5173"
      - "3000:3000" # 나중에 Hono 서버용 포트 미리 뚫어두기
    # -it 옵션과 동일 (컨테이너가 종료되지 않게 유지)
    stdin_open: true
    tty: true
    # 컨테이너 시작 시 실행할 명령어 (Vite 실행)
    command: bun run dev

