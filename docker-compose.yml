# docker compose up: 설정 파일대로 컨테이너를 생성하고 실행합니다. (로그가 실시간으로 보임)

# docker compose up -d: 백그라운드(데몬)에서 실행합니다. (터미널을 계속 쓸 수 있음)

# docker compose down: 실행 중인 컨테이너를 멈추고 깔끔하게 삭제합니다.

# docker compose exec app bash: 실행 중인 컨테이너 내부(app 서비스)로 접속합니다. (여기서 bun install 등을 하면 됨)

# docker compose logs -f : 포그라운드 attach 보다 유연함